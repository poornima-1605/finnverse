{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
                <div class="card-header bg-danger text-white p-4 border-0">
                    <div class="d-flex align-items-center">
                        <div class="bg-white bg-opacity-25 rounded-circle p-2 me-3">
                            <i class="material-icons fs-3">receipt_long</i>
                        </div>
                        <div>
                            <h4 class="fw-bold mb-0">Add Expense</h4>
                            <p class="small opacity-75 mb-0">Record your spending to stay within budget</p>
                        </div>
                    </div>
                </div>
                
                

                        

                <div class="card-body p-4 p-lg-5 bg-white">
                    <form method="POST" class="needs-validation">


                        
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold text-muted small uppercase">Expense Title</label>
                            <div class="input-group border rounded-3 overflow-hidden shadow-sm">
                                <span class="input-group-text bg-light border-0"><i class="material-icons fs-5 text-danger">edit</i></span>
                                <input type="text" name="title" value="{{ expense.title if expense else '' }}" 
                                       class="form-control border-0 bg-light py-2" placeholder="e.g. Grocery, Rent" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold text-muted small uppercase">Category</label>
                            <div class="input-group border rounded-3 overflow-hidden shadow-sm">
                                <span class="input-group-text bg-light border-0"><i class="material-icons fs-5 text-danger">label</i></span>
                                <select name="category_id" class="form-select border-0 bg-light py-2" required>
                                    <option value="" disabled selected>Select Category</option>
                                    {% for cat in categories %}
                                        <option value="{{ cat.id }}" {% if expense and expense.category_id == cat.id %}selected{% endif %}>
                                            {{ cat.name }}
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label class="form-label fw-bold text-muted small uppercase">Amount (₹)</label>
                                
                                <div class="input-group border rounded-3 overflow-hidden shadow-sm">
                                    <span class="input-group-text bg-light border-0"><i class="material-icons fs-5 text-danger">payments</i></span>
                                    <input type="number" name="amount" step="0.01" min = "0.01" svalue="{{ expense.amount if expense else '' }}" 
                                           class="form-control border-0 bg-light py-2" placeholder="500.00" required>
                                </div>
                            </div>

                            <div class="col-md-6 mb-4">
    <label class="form-label fw-bold text-muted small uppercase">Date</label>
    <div class="input-group border rounded-3 overflow-hidden shadow-sm">
        <span class="input-group-text bg-light border-0">
            <i class="material-icons fs-5 text-danger">calendar_today</i>
        </span>
        <input type="date" name="date" 
               value="{{ expense.date if expense else today_date }}" 
               class="form-control border-0 bg-light py-2" required>
    </div>
</div>

                        
    <hr>

<div class="form-check mb-3">
  <input class="form-check-input" type="checkbox" name="is_recurring" id="isRecurring">
  <label class="form-check-label" for="isRecurring">
    Make this a recurring expense
  </label>
</div>

<div id="recurringOptions" style="display:none;">
  <label class="form-label">Frequency</label>
  <select name="frequency" class="form-control mb-3">
    <option value="monthly">Monthly</option>
    <option value="weekly">Weekly</option>
  </select>
</div>

<script>
document.getElementById("isRecurring").addEventListener("change", function() {
    document.getElementById("recurringOptions").style.display =
        this.checked ? "block" : "none";
});
</script>

                        
                        <div class="d-grid pt-2">
                            <button type="submit" class="btn btn-danger btn-lg rounded-pill fw-bold shadow-sm transition-hover">
                                <i class="material-icons align-middle me-1">save</i> Save Transaction
                            </button>
                            <a href="{{ url_for('dashboard') }}" class="btn btn-link text-muted mt-2 text-decoration-none small">Cancel and go back</a>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const titleInput = document.querySelector('input[name="title"]');
    const categorySelect = document.querySelector('select[name="category_id"]');

    // 1. Map words to Category NAMES (not IDs)
    const nameMap = {
    // 1. Education
    'fees': 'Education', 'school': 'Education', 'college': 'Education', 'tution': 'Education', 'books': 'Education', 'xerox': 'Education', 'stationery': 'Education', 'udemy': 'Education', 'coursera': 'Education', 'exam': 'Education',

    // 2. Food
    'zomato': 'Food', 'swiggy': 'Food', 'blinkit': 'Food', 'zepto': 'Food', 'grocery': 'Food', 'milk': 'Food', 'doodh': 'Food', 'sabji': 'Food', 'mutton': 'Food', 'chicken': 'Food', 'restaurant': 'Food', 'chai': 'Food', 'maggi': 'Food', 'canteen': 'Food',

    // 3. Transport
    'petrol': 'Transport', 'diesel': 'Transport', 'auto': 'Transport', 'rickshaw': 'Transport', 'bus': 'Transport', 'metro': 'Transport', 'train': 'Transport', 'uber': 'Transport', 'ola': 'Transport', 'parking': 'Transport', 'toll': 'Transport',

    // 4. Rent
    'rent': 'Rent', 'pg': 'Rent', 'room': 'Rent', 'flat': 'Rent', 'maintenance': 'Rent', 'deposit': 'Rent',

    // 5. Healthcare
    'doctor': 'Healthcare', 'medicine': 'Healthcare', 'pharmacy': 'Healthcare', 'hospital': 'Healthcare', 'clinic': 'Healthcare', 'gym': 'Healthcare', 'protein': 'Healthcare', 'tablet': 'Healthcare', 'test': 'Healthcare', 'lab': 'Healthcare',

    // 6. Travel
    'flight': 'Travel', 'hotel': 'Travel', 'vacation': 'Travel', 'trip': 'Travel', 'irctc': 'Travel', 'indigo': 'Travel', 'makemytrip': 'Travel', 'goibibo': 'Travel', 'resort': 'Travel',

    // 7. Utilities
    'gas': 'Utilities', 'cylinder': 'Utilities', 'water': 'Utilities', 'wifi': 'Utilities', 'broadband': 'Utilities', 'garbage': 'Utilities', 'cleaning': 'Utilities', 'maid': 'Utilities',

    // 8. Bills
    'recharge': 'Bills', 'electricity': 'Bills', 'jio': 'Bills', 'airtel': 'Bills', 'vi': 'Bills', 'postpaid': 'Bills', 'prepaid': 'Bills', 'insurance': 'Bills', 'lic': 'Bills',

    // 9. Entertainment
    'movie': 'Entertainment', 'pvr': 'Entertainment', 'netflix': 'Entertainment', 'prime': 'Entertainment', 'hotstar': 'Entertainment', 'spotify': 'Entertainment', 'club': 'Entertainment', 'party': 'Entertainment', 'gaming': 'Entertainment',

    // 10. Other
    'gift': 'Other', 'shopping': 'Other', 'clothes': 'Other', 'salon': 'Other', 'barber': 'Other', 'mandir': 'Other', 'donation': 'Other', 'shadi': 'Other'
};

    // 2. Helper function to find ID based on Name
    function findIdByName(name) {
        const options = categorySelect.options;
        for (let i = 0; i < options.length; i++) {
            // We trim and lowercase to ensure a perfect match
            if (options[i].text.trim().toLowerCase() === name.toLowerCase()) {
                return options[i].value;
            }
        }
        return null;
    }

    titleInput.addEventListener('input', function() {
        const words = this.value.toLowerCase().split(/\s+/);
        
        for (const word of words) {
            const targetCategoryName = nameMap[word];
            if (targetCategoryName) {
                const correctId = findIdByName(targetCategoryName);
                
                if (correctId) {
                    categorySelect.value = correctId;
                    
                    // Visual feedback
                    categorySelect.style.borderColor = "#008080";
                    categorySelect.style.boxShadow = "0 0 10px rgba(0, 128, 128, 0.2)";
                    
                    setTimeout(() => { 
                        categorySelect.style.borderColor = "#dee2e6"; 
                        categorySelect.style.boxShadow = "none";
                    }, 1000);
                    
                    break;
                }
            }
        }
    });
});
</script>

<style>
    .bg-light { background-color: #f8f9fa !important; }
    .btn-danger { background-color: #dc3545; border: none; }
    .btn-danger:hover { background-color: #bb2d3b; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(220, 53, 69, 0.3); }
    .transition-hover { transition: all 0.3s ease; }
    .form-control:focus, .form-select:focus { background-color: white !important; box-shadow: none; border-color: #dc3545; }
</style>
{% endblock %}
