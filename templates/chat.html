{% extends "base.html" %}

{% block content %}

<div class="chat-container">
    <div class="chat-messages" id="chatMessages"></div><form id="chatForm" class="chat-input">
    <input type="text" name="prompt" id="promptInput" class="form-control" placeholder="Type your message..." required>
    <button type="submit" class="btn btn-teal">Send</button>
</form>

</div><script>
const chatMessages = document.getElementById('chatMessages');
const chatForm = document.getElementById('chatForm');
const promptInput = document.getElementById('promptInput');

function addMessage(text, sender) {
    const div = document.createElement('div');
    div.className = 'message ' + (sender === 'user' ? 'user-message' : 'ai-message');
    const msgContent = document.createElement('div');
    msgContent.className = 'msg-content';
    msgContent.textContent = text;
    div.appendChild(msgContent);
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

chatForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const prompt = promptInput.value.trim();
    if (!prompt) return;

    addMessage(prompt, 'user');
    promptInput.value = '';

    try {
        const response = await fetch('{{ url_for("chat") }}', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt: prompt })
        });

        const data = await response.json();
        if (data.reply) {
            addMessage(data.reply, 'ai');
        } else {
            addMessage("Error: no reply from AI.", 'ai');
        }
    } catch (err) {
        console.error(err);
        addMessage("Error communicating with server.", 'ai');
    }
});
</script>{% endblock %}
