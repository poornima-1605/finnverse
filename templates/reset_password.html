{% extends "base.html" %}

{% block content %}
<div class="container mt-5" style="max-width: 450px;">
    <div class="card shadow rounded-4 border-0">
        <div class="card-body p-4">
            <h3 class="text-center mb-4 fw-bold" style="color: #008080;">Reset Password</h3>
            <p class="text-muted small text-center mb-4">Please choose a strong new password to secure your account.</p>

            <form method="POST" id="resetForm">
                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted text-uppercase ls-1">New Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0 rounded-pill-start">
                            <i class="material-icons text-teal fs-5">lock_open</i>
                        </span>
                        <input type="password" name="password" id="password" 
                               class="form-control form-control-lg bg-light border-0 rounded-pill-end" 
                               style="font-size:15px" placeholder="••••••••" required>
                    </div>
                    
                    <div class="progress mt-2" style="height: 5px; border-radius: 10px;">
                        <div id="strengthBar" class="progress-bar" role="progressbar" style="width: 0%"></div>
                    </div>
                    <small id="passwordStrength" class="form-text mt-1 d-block" style="font-size: 12px;"></small>
                </div>

                <button type="submit" class="btn btn-teal btn-lg w-100 rounded-pill fw-bold py-3 transition-hover shadow-sm">
                    Update Password <i class="material-icons align-middle ms-1">update</i>
                </button>
            </form>
        </div>
    </div>
</div>

<style>
    .text-teal { color: #008080; }
    .btn-teal { background-color: #008080; color: white; border: none; }
    .btn-teal:hover { background-color: #006666; color: white; transform: translateY(-2px); }
    .bg-light { background-color: #f0f7f7 !important; }
    .ls-1 { letter-spacing: 1px; }
    .rounded-pill-start { border-top-left-radius: 50rem !important; border-bottom-left-radius: 50rem !important; }
    .rounded-pill-end { border-top-right-radius: 50rem !important; border-bottom-right-radius: 50rem !important; }
    .transition-hover { transition: all 0.3s ease; }
</style>

<script>
const passwordInput = document.getElementById("password");
const strengthText = document.getElementById("passwordStrength");
const strengthBar = document.getElementById("strengthBar");

passwordInput.addEventListener("input", function () {
    const value = passwordInput.value;
    let strength = 0;

    if (value.length >= 8) strength++;
    if (/[a-z]/.test(value)) strength++;
    if (/[A-Z]/.test(value)) strength++;
    if (/\d/.test(value)) strength++;
    if (/[!@#$%^&*(),.?":{}|<>]/.test(value)) strength++;

    const percentage = (strength / 5) * 100;
    strengthBar.style.width = percentage + "%";

    if (value.length === 0) {
        strengthText.textContent = "";
        strengthBar.className = "progress-bar";
    } else if (strength < 3) {
        strengthText.textContent = "Weak password ❌";
        strengthText.style.color = "red";
        strengthBar.className = "progress-bar bg-danger";
    } else if (strength < 5) {
        strengthText.textContent = "Moderate password ⚠️";
        strengthText.style.color = "orange";
        strengthBar.className = "progress-bar bg-warning";
    } else {
        strengthText.textContent = "Strong password ✅";
        strengthText.style.color = "green";
        strengthBar.className = "progress-bar bg-success";
    }
});

// Final Validation before submitting the reset
document.getElementById("resetForm").addEventListener("submit", function(event) {
    const password = passwordInput.value;
    const strongPasswordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*(),.?":{}|<>]).{8,}$/;

    if (!strongPasswordRegex.test(password)) {
        alert("❌ Password must be at least 8 characters long and include Uppercase, Lowercase, Number, and Special character.");
        event.preventDefault();
    }
});
</script>
{% endblock %}
